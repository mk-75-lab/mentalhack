<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>こころの貯金箱 V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#fcfaf2] text-stone-800 transition-colors duration-500">

    <div id="app-container" class="pb-24">
        <header class="p-5 bg-white border-b border-stone-100 flex justify-between items-center sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-2" onclick="showTab('home')">
                <div class="bg-emerald-600 p-2 rounded-lg text-white"><i data-lucide="smile" class="w-5 h-5"></i></div>
                <h1 class="font-black text-sm leading-none">こころの<br>貯金箱</h1>
            </div>
            <button onclick="toggleDark()" class="p-2 opacity-50"><i data-lucide="moon" id="dark-icon"></i></button>
        </header>

        <main class="p-5 max-w-lg mx-auto w-full">
            <div id="home" class="tab-content active animate-fade-in space-y-6">
                <div class="py-4"><h2 class="text-2xl font-black tracking-tighter" id="welcome-msg">次はどうする？</h2><p class="text-sm font-bold text-stone-400">マサキ専用エディション</p></div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="showTab('ledger')" class="p-6 rounded-[2rem] bg-blue-50 flex flex-col items-start active:scale-95 transition-transform border border-blue-100">
                        <div class="p-3 rounded-2xl bg-white shadow-sm mb-4 text-blue-500"><i data-lucide="message-square"></i></div>
                        <span class="font-black text-sm">思考日誌</span>
                    </button>
                    <button onclick="showTab('wave')" class="p-6 rounded-[2rem] bg-amber-50 flex flex-col items-start active:scale-95 transition-transform border border-amber-100">
                        <div class="p-3 rounded-2xl bg-white shadow-sm mb-4 text-amber-500"><i data-lucide="activity"></i></div>
                        <span class="font-black text-sm">気分の波</span>
                    </button>
                    <button onclick="showTab('values')" class="p-6 rounded-[2rem] bg-purple-50 flex flex-col items-start active:scale-95 transition-transform border border-purple-100">
                        <div class="p-3 rounded-2xl bg-white shadow-sm mb-4 text-purple-500"><i data-lucide="compass"></i></div>
                        <span class="font-black text-sm">羅針盤</span>
                    </button>
                    <button onclick="showTab('gt')" class="p-6 rounded-[2rem] bg-yellow-50 flex flex-col items-start active:scale-95 transition-transform border border-yellow-100">
                        <div class="p-3 rounded-2xl bg-white shadow-sm mb-4 text-yellow-500"><i data-lucide="star"></i></div>
                        <span class="font-black text-sm">三つ星日記</span>
                    </button>
                    <button onclick="showTab('breathe')" class="p-6 rounded-[2rem] bg-emerald-50 flex flex-col items-start active:scale-95 transition-transform border border-emerald-100">
                        <div class="p-3 rounded-2xl bg-white shadow-sm mb-4 text-emerald-500"><i data-lucide="wind"></i></div>
                        <span class="font-black text-sm">マインドフル</span>
                    </button>
                    <button onclick="showTab('form')" class="p-6 rounded-[2rem] bg-indigo-50 flex flex-col items-start active:scale-95 transition-transform border border-indigo-100">
                        <div class="p-3 rounded-2xl bg-white shadow-sm mb-4 text-indigo-500"><i data-lucide="brain-circuit"></i></div>
                        <span class="font-black text-sm">心の仕組み</span>
                    </button>
                </div>
            </div>

            <div id="gt" class="tab-content animate-fade-in space-y-6">
                <h2 class="text-xl font-black">三つ星日記</h2>
                <div id="gt-list" class="space-y-4"></div>
                <button onclick="saveGtPrompt()" class="w-full bg-yellow-500 text-white p-4 rounded-2xl font-black">星を貯める</button>
            </div>

            <div id="ledger" class="tab-content animate-fade-in space-y-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black">思考日誌</h2><button onclick="addLedgerPrompt()" class="bg-blue-600 text-white p-2 rounded-xl"><i data-lucide="plus"></i></button></div>
                <div id="ledger-list" class="space-y-4"></div>
            </div>
            
            <div id="wave" class="tab-content animate-fade-in space-y-6">
                <h2 class="text-xl font-black">気分の波</h2>
                <p class="text-stone-400 font-bold text-sm">スマホを縦にして見ると綺麗だよ。</p>
                </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-white border-t border-stone-100 p-4 pb-8 flex justify-around rounded-t-[2.5rem] z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
            <button onclick="showTab('home')" class="p-2 text-stone-300 active:text-emerald-500"><i data-lucide="home"></i></button>
            <button onclick="showTab('ledger')" class="p-2 text-stone-300 active:text-emerald-500"><i data-lucide="message-square"></i></button>
            <button onclick="showTab('gt')" class="p-2 text-stone-300 active:text-emerald-500"><i data-lucide="star"></i></button>
        </nav>
    </div>

    <script>
        // --- 状態管理：LocalStorageに直結 ---
        let data = {
            ents: JSON.parse(localStorage.getItem('m_ents')) || [],
            gts: JSON.parse(localStorage.getItem('m_gts')) || []
        };

        // タブの切り替え
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons(); // アイコン再描画
            window.scrollTo(0,0);
        }

        // 日誌の追加（剥き出しを防ぐためシンプルなPrompt方式）
        function addLedgerPrompt() {
            const c = prompt("今のモヤモヤは？");
            const r = prompt("別の考え方は？");
            if (c && r) {
                data.ents.unshift({ id: Date.now(), content: c, rethought: r });
                localStorage.setItem('m_ents', JSON.stringify(data.ents));
                renderLedger();
            }
        }

        function renderLedger() {
            const list = document.getElementById('ledger-list');
            list.innerHTML = data.ents.map(e => `
                <div class="p-5 rounded-3xl bg-white border border-stone-100 shadow-sm">
                    <p class="text-xs font-bold text-stone-400 italic mb-2">「${e.content}」</p>
                    <p class="text-sm font-bold leading-relaxed">${e.rethought}</p>
                </div>
            `).join('');
        }

        // 初期化
        window.onload = function() {
            renderLedger();
            lucide.createIcons();
        };
    </script>
</body>
</html>
